# Repository-local Arduino CLI configuration for i2s_synths firmware builds.
# Scripts pass this file via --config-file.
#
# firmware_build keys are parsed by scripts/*.sh (arduino-cli ignores unknown keys).

board_manager:
  additional_urls: []

sketch:
  always_export_binaries: false

firmware_build:
  # Waveshare ESP32-S3-Zero (FH4R2): QSPI PSRAM, native USB CDC on boot (no USB-UART bridge).
  fqbn: esp32:esp32:waveshare_esp32_s3_zero:PSRAM=enabled,CDCOnBoot=cdc,USBMode=hwcdc
  sketch_name: i2s_synths
  serial_baud: 115200
