<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <link rel="icon" href="data:," />
  <title>Module Chain Simulator — Chain MVP</title>
  <style>
    :root {
      font-family: system-ui, sans-serif;
      color: #e8e8e8;
      background: #12141a;
      --chain-card-min: 14rem;
      --chain-gap: 0.75rem;
    }
    *, *::before, *::after { box-sizing: border-box; }
    body {
      margin: 0 auto;
      max-width: 100%;
      padding: 1rem;
    }
    @media (min-width: 48rem) {
      body { padding: 1.5rem; }
    }
    h1 { font-size: 1.25rem; margin-top: 0; }
    h2 { font-size: 0.95rem; margin: 0 0 0.75rem; font-weight: 600; }
    label { display: block; margin: 0.5rem 0 0.25rem; font-size: 0.85rem; }
    select, button {
      font: inherit;
      padding: 0.4rem 0.6rem;
      border-radius: 6px;
      border: 1px solid #444;
      background: #1e2230;
      color: inherit;
    }
    button { cursor: pointer; }
    button:disabled { opacity: 0.45; cursor: not-allowed; }
    input[type="range"] { width: 100%; }
    .row { display: flex; align-items: center; gap: 0.5rem; }
    .hint { font-size: 0.85rem; color: #9ab; }
    #status {
      margin-top: 1rem;
      padding: 0.75rem;
      background: #1a1f2b;
      border-radius: 6px;
      font-size: 0.9rem;
    }
    .chain-row {
      display: grid;
      grid-template-columns: 1fr;
      gap: var(--chain-gap);
      margin-top: 1rem;
      align-items: stretch;
    }
    /* Landscape with room, or wide viewports: tile panes and wrap to next row */
    @media (orientation: landscape) and (min-width: 36rem) {
      .chain-row {
        grid-template-columns: repeat(auto-fill, minmax(var(--chain-card-min), 1fr));
      }
    }
    @media (min-width: 56rem) {
      .chain-row {
        grid-template-columns: repeat(auto-fill, minmax(var(--chain-card-min), 1fr));
      }
    }
    #units-container {
      display: contents;
    }
    .chain-card {
      min-width: 0;
      width: 100%;
      padding: 0.85rem;
      background: #1a1f2b;
      border: 1px solid #2a3140;
      border-radius: 8px;
    }
    .chain-card.unit-card {
      display: flex;
      flex-direction: column;
    }
    .unit-card .card-controls {
      flex: 0 0 auto;
    }
    .unit-card .level-graphs {
      flex: 0 0 auto;
      margin-top: auto;
    }
    .loopback-slot {
      min-height: 1.75rem;
    }
    .unit-card:not(.is-rightmost) .loopback-row {
      display: none;
    }
    .chain-card.gateway {
      border-color: #3a5070;
      display: flex;
      flex-direction: column;
    }
    .gateway-fill {
      flex: 1 1 auto;
      min-height: 0;
    }
    .chain-card .card-title {
      font-size: 0.8rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      color: #8a95a8;
      margin-bottom: 0.5rem;
    }
    .module-info { font-size: 0.8rem; color: #9ab; margin-top: 0.35rem; }
    .level-graphs {
      display: flex;
      flex-direction: column;
      gap: 0.25rem;
      width: 100%;
    }
    .level-graph {
      width: 100%;
      height: 3.75rem;
      display: block;
      border-radius: 4px;
      border: 1px solid #2a3140;
      background: #141820;
      image-rendering: crisp-edges;
    }
    @media (max-width: 35.99rem), (orientation: portrait) and (max-width: 55.99rem) {
      .level-graph { height: 4.25rem; }
    }
    .chain-controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem;
      margin-top: 0.75rem;
    }
    .loopback-row { margin-top: 0.5rem; font-size: 0.85rem; }
  </style>
</head>
<body>
  <h1>Module Chain Simulator (Chain MVP)</h1>
  <p class="hint">Gateway I/O plus appendable processing units — firmware modules compiled to WebAssembly. Use localhost or HTTPS for microphone access.</p>

  <div class="chain-row" id="chain-row">
    <div class="chain-card gateway" id="gateway-card">
      <div class="card-title">Gateway</div>
      <div class="row">
        <input id="mic-toggle" type="checkbox" checked />
        <label for="mic-toggle" style="margin: 0;">Microphone input</label>
      </div>
      <button id="start-btn" type="button" style="margin-top: 0.75rem; width: 100%;">Start audio</button>
      <div class="gateway-fill" aria-hidden="true"></div>
    </div>
    <div id="units-container"></div>
  </div>

  <div class="chain-controls">
    <button id="add-unit-btn" type="button">Add unit</button>
    <span class="hint" id="unit-count-hint"></span>
  </div>

  <div id="status">Loading…</div>

  <script type="module" src="./main.js"></script>
</body>
</html>
